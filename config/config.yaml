defaults:
  - model: qwen3_4b_instruct
  - slurm: default_4090
  - _self_

# 要执行的评测脚本，可通过 script=xxx 覆盖
script: visbench/eval_vsibench.py
dataset: vsibench
dataset_split: test
dataset_name: nyu-visionx/VSI-Bench
dataset_config: full
dataset_no_config: false

video_dir: ${oc.env:HOME}/dataset/vsi_bench
seed: 42
num_samples: all
task_filter: mcq
num_frames: 4
frame_sampling_method: uniform
use_preprocessed_clip_frames: false
preprocessed_clip_fps: 1.0
preprocessed_clip_dir: ""
quota_prescreen_alpha: 3
max_keywords: 5
focus_blip_model_name: Salesforce/blip-itm-base-coco
focus_blip_device: null
focus_blip_batch_size: 16
# vqa_eval_ours.py 早停与迭代步长超参数
enable_early_stop: true
early_stop_window: 3
early_stop_conf_threshold: 0.9
frame_increment: 1
layered_candidate_frames: 64
layered_pool_h: 2
layered_pool_w: 2
layered_enable_layer0: true
layered_enable_layer1: true
layered_topk1: 12
layered_topk2: 48
layered_budget: -1
layered_scorer: clip
layered_layer1_mode: global_patch_sort
verify_prefix_property: true
# 与 eval_vsibench / train_vsibench 划分一致时可覆盖
train_ratio: 0.8

# LoRA 评测（与 visbench/train_vsibench.py --output_dir 对齐）
# 用法：lora.enabled=true lora.adapter_path=/path/to/output_dir
# base_model 为空时，评测基座默认用当前 model.name（与训练时 --model_path 一致）
lora:
  enabled: false
  adapter_path: ""
  base_model: null
  merge_lora: false

train:
  output_dir: outputs/vsibench_train/${model.name}/${task_filter}_frames${num_frames}
  max_samples: null

hydra:
  run:
    dir: outputs/${model.name}/${task_filter}_frames${num_frames}
  sweep:
    dir: outputs/multirun/${now:%Y-%m-%d_%H-%M-%S}
    subdir: ${model.name}/${task_filter}_frames${num_frames}
